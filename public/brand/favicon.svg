<svg viewBox="44 24 212 164" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alivon favicon">
  <title>Alivon</title>
  <defs>
    <linearGradient id="aGradFav" x1="0.15" y1="0" x2="0.55" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Network arc -->
  <path d="M 52 178 Q 150 36 248 178" stroke="#90A4AE" stroke-width="1.4" fill="none"/>

  <!-- Network connecting lines -->
  <line x1="52"  y1="178" x2="100" y2="116" stroke="#90A4AE" stroke-width="1.1"/>
  <line x1="100" y1="116" x2="150" y2="98"  stroke="#90A4AE" stroke-width="1.1"/>
  <line x1="150" y1="98"  x2="200" y2="116" stroke="#90A4AE" stroke-width="1.1"/>
  <line x1="200" y1="116" x2="248" y2="178" stroke="#90A4AE" stroke-width="1.1"/>
  <line x1="100" y1="116" x2="200" y2="116" stroke="#90A4AE" stroke-width="1.1"/>
  <line x1="150" y1="98"  x2="196" y2="50"  stroke="#90A4AE" stroke-width="0.75" stroke-dasharray="3 2.5"/>

  <!-- A letterform — left leg -->
  <polygon points="150,32 62,212 86,212 150,64" fill="url(#aGradFav)"/>

  <!-- A letterform — right leg -->
  <polygon points="150,32 238,212 214,212 150,64" fill="url(#aGradFav)" opacity="0.88"/>

  <!-- A letterform — inner depth shadow -->
  <polygon points="150,64 214,212 196,212 150,140" fill="#0D47A1" opacity="0.44"/>

  <!-- A letterform — crossbar -->
  <polygon points="97,140 203,140 213,160 87,160" fill="#0D47A1"/>

  <!-- Network nodes -->
  <circle cx="52"  cy="178" r="8"   fill="#1976D2"/>
  <circle cx="100" cy="116" r="6.5" fill="#546E7A"/>
  <circle cx="150" cy="98"  r="8"   fill="#1976D2"/>
  <circle cx="200" cy="116" r="8"   fill="#1976D2"/>
  <circle cx="248" cy="178" r="6.5" fill="#546E7A"/>
  <circle cx="196" cy="50"  r="5.5" fill="#BBDEFB" opacity="0.9"/>
</svg>
